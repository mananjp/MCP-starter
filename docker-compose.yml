services:
  backend:
    image: ghcr.io/mananjp/mcp-starter-backend:latest
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    image: ghcr.io/mananjp/mcp-starter-frontend:latest
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - MCP_SERVER_URL=http://backend:8000/sse
      - PYTHONUNBUFFERED=1
    env_file:
      - .env